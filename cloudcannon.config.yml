# CloudCannon Configuration
# This file configures how CloudCannon handles your site

paths:
  source: /
  layouts: /
  includes: /
  data: /

# Define editable regions
_editables:
  # Text elements
  p:
    class: editable
    options:
      format: p
      bold: true
      italic: true
      underline: true
      link: true
      strike: true
  
  # Headings
  h1:
    class: editable
    options:
      format: h1
      bold: true
      italic: true
  
  h2:
    class: editable
    options:
      format: h2
      bold: true
      italic: true
  
  h3:
    class: editable
    options:
      format: h3
      bold: true
      italic: true
  
  h4:
    class: editable
    options:
      format: h4
      bold: true
      italic: true
  
  h5:
    class: editable
    options:
      format: h5
      bold: true
      italic: true
  
  h6:
    class: editable
    options:
      format: h6
      bold: true
      italic: true
  
  # Links
  a:
    class: editable
    options:
      link: true
  
  # Images
  img:
    class: editable
    options:
      format: img
  
  # Videos
  video:
    class: editable
    options:
      format: video

# Collections
collections:
  pages:
    path: /
    filter: .html
    name: Pages
    icon: description

# Content editor configuration
content_editors:
  - visual

# CloudCannon editor specific settings
editor:
  default_path: /index.html

# Visual editor settings
source_editor: true
